<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Aurex is a premium music experience with playback, lyrics, downloads, and shared listening rooms.">
  <meta name="theme-color" content="#05070A">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Aurex">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Aurex</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #05070A;
      color: #F5F7FA;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      overflow: hidden;
    }

    #boot {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(135deg, rgba(61, 189, 248, 0.16) 0%, rgba(61, 189, 248, 0) 38%),
        linear-gradient(315deg, rgba(168, 85, 247, 0.12) 0%, rgba(168, 85, 247, 0) 34%),
        linear-gradient(180deg, #05070A 0%, #081019 55%, #05070A 100%);
      z-index: 9999;
    }

    .boot-shell {
      width: min(420px, calc(100vw - 48px));
      padding: 28px;
      border-radius: 8px;
      border: 1px solid rgba(125, 211, 252, 0.14);
      background: rgba(10, 18, 28, 0.92);
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.35);
      box-sizing: border-box;
    }

    .boot-badge {
      display: block;
      width: 74px;
      height: 74px;
      object-fit: contain;
    }

    .boot-title {
      margin: 18px 0 8px;
      font-size: 36px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
    }

    .boot-copy {
      margin: 0 0 22px;
      color: rgba(245, 247, 250, 0.7);
      font-size: 15px;
      line-height: 1.6;
    }

    .boot-bar {
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }

    .boot-bar::after {
      content: "";
      display: block;
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #38BDF8 0%, #7DD3FC 100%);
      animation: aurex-load 1.1s ease-in-out infinite alternate;
      transform-origin: left center;
    }

    @keyframes aurex-load {
      from { transform: translateX(0) scaleX(0.9); }
      to { transform: translateX(135%) scaleX(1.25); }
    }
  </style>
</head>
<body>
  <div id="boot" aria-live="polite">
    <div class="boot-shell">
      <img class="boot-badge" src="icons/Icon-192.png" alt="Aurex logo" />
      <div class="boot-title">Aurex</div>
      <p class="boot-copy">Loading your music, library, and listening session.</p>
      <div class="boot-bar"></div>
    </div>
  </div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="boot.js"></script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
